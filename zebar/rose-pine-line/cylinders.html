<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="./cylinders.css" />
    <script
      src="https://unpkg.com/@babel/standalone@7.25.6/babel.min.js"
      integrity="sha256-aS0B0wnsaDByLfE16h4MDCP1fQFccysd1YWOcV+gbBo="
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
      import React, { useEffect, useRef, useState } from 'https://esm.sh/react@18?dev';
      import { createRoot } from 'https://esm.sh/react-dom@18/client?dev';
      import * as zebar from 'https://esm.sh/zebar@3.3.1';

      const providers = zebar.createProviderGroup({
        glazewm: { type: 'glazewm' },
        network: { type: 'network' },
        cpu: { type: 'cpu' },
        memory: { type: 'memory' },
        battery: { type: 'battery' },
        date: { type: 'date', formatting: 'EEE, MMM d  •  h:mm a' },
      });

      const Icon = ({ name, className = '' }) => (
        <i className={`nf ${name} ${className}`}></i>
      );

      function networkIcon(network) {
        if (network.defaultInterface?.type === 'ethernet') return 'nf-md-ethernet_cable';
        if (network.defaultInterface?.type !== 'wifi') return 'nf-md-wifi_strength_off_outline';
        const strength = network.defaultGateway?.signalStrength ?? 0;
        if (strength >= 75) return 'nf-md-wifi_strength_4';
        if (strength >= 50) return 'nf-md-wifi_strength_3';
        if (strength >= 25) return 'nf-md-wifi_strength_2';
        return 'nf-md-wifi_strength_1';
      }

      function batteryIcon(battery) {
        if (battery.isCharging) return 'nf-md-power_plug';
        if (battery.chargePercent > 75) return 'nf-fa-battery_4';
        if (battery.chargePercent > 50) return 'nf-fa-battery_3';
        if (battery.chargePercent > 25) return 'nf-fa-battery_2';
        return 'nf-fa-battery_1';
      }

      function App() {
        const [output, setOutput] = useState(providers.outputMap);
        const [showWorkspaceSwitcher, setShowWorkspaceSwitcher] = useState(false);
        const previousWorkspace = useRef(null);
        const workspaceTimer = useRef(null);

        useEffect(() => providers.onOutput(() => setOutput({ ...providers.outputMap })), []);

        const focusedWorkspace =
          output.glazewm?.focusedWorkspace ??
          output.glazewm?.allWorkspaces?.find(workspace => workspace.hasFocus);
        const focusedWindow = output.glazewm?.allWindows?.find(window => window.hasFocus);
        const focusedApp =
          focusedWindow?.processName ??
          focusedWindow?.process ??
          focusedWindow?.title ??
          'Desktop';

        useEffect(() => {
          const workspaceName = focusedWorkspace?.name;
          if (!workspaceName) return;

          // Do not animate on initial load; only react to an actual switch.
          if (previousWorkspace.current === null) {
            previousWorkspace.current = workspaceName;
            return;
          }

          if (previousWorkspace.current !== workspaceName) {
            previousWorkspace.current = workspaceName;
            setShowWorkspaceSwitcher(true);
            clearTimeout(workspaceTimer.current);
            workspaceTimer.current = setTimeout(
              () => setShowWorkspaceSwitcher(false),
              2000,
            );
          }
        }, [focusedWorkspace?.name]);

        useEffect(() => () => clearTimeout(workspaceTimer.current), []);

        return (
          <main className="bar">
            <section className="left">
              <div className="brand">
                <Icon name="nf-md-flower_poppy" />
                <span className="line"></span>
                <span className="focused-app" title={focusedWindow?.title ?? focusedApp}>
                  {focusedApp}
                </span>
              </div>

            </section>

            <section className={`center-stage ${showWorkspaceSwitcher ? 'show-workspaces' : ''}`}>
              <div className="center-face clock">
                <span className="line"></span>
                <span>{output.date?.formatted}</span>
                <span className="line"></span>
              </div>

              <div className="center-face desktop-switcher">
                <span className="line"></span>
                <div className="desktop-numbers">
                  {output.glazewm?.allWorkspaces?.map(workspace => (
                    <button
                      key={workspace.name}
                      className={workspace.hasFocus ? 'active' : ''}
                      onClick={() => output.glazewm.runCommand(`focus --workspace ${workspace.name}`)}
                    >
                      {workspace.displayName ?? workspace.name}
                    </button>
                  ))}
                </div>
                <span className="line"></span>
              </div>
            </section>

            <section className="right">
              {output.glazewm?.bindingModes.map(mode => (
                <button
                  className="mode"
                  key={mode.name}
                  onClick={() => output.glazewm.runCommand(`wm-disable-binding-mode --name ${mode.name}`)}
                >
                  {mode.displayName ?? mode.name}
                </button>
              ))}

              {output.glazewm && (
                <button
                  className="direction"
                  title="Toggle tiling direction"
                  onClick={() => output.glazewm.runCommand('toggle-tiling-direction')}
                >
                  <Icon name={output.glazewm.tilingDirection === 'horizontal' ? 'nf-md-swap_horizontal' : 'nf-md-swap_vertical'} />
                </button>
              )}

              {output.network && (
                <div className="stat network">
                  <Icon name={networkIcon(output.network)} />
                  <span>{output.network.defaultInterface?.type === 'ethernet' ? 'LAN' : output.network.defaultGateway?.ssid}</span>
                </div>
              )}

              {output.memory && (
                <div className="stat memory">
                  <Icon name="nf-fae-chip" />
                  <span>{Math.round(output.memory.usage)}%</span>
                </div>
              )}

              {output.cpu && (
                <div className={`stat cpu ${output.cpu.usage > 85 ? 'danger' : ''}`}>
                  <Icon name="nf-oct-cpu" />
                  <span>{Math.round(output.cpu.usage)}%</span>
                </div>
              )}

              {output.battery && (
                <div className={`stat battery ${output.battery.chargePercent <= 20 ? 'danger' : ''}`}>
                  <Icon name={batteryIcon(output.battery)} />
                  <span>{Math.round(output.battery.chargePercent)}%</span>
                </div>
              )}
            </section>
          </main>
        );
      }

      createRoot(document.getElementById('root')).render(<App />);
    </script>
  </body>
</html>
